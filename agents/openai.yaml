interface:
  display_name: "Forge Memory"
  short_description: "生成紧凑项目上下文、agent/skill 摘要、知识图谱、JSONL 静态索引与会话记忆"
  default_prompt: "使用 $forge-memory 初始化或恢复结构化项目上下文。"
policy:
  allow_implicit_invocation: true
  implicit_invocation_scope:
    - "用户明确要求全面了解、全面扫描、完整梳理或全量了解整个项目时可以被动触发。"
    - "普通代码修改、局部分析、普通总结、只因项目很大或发现 .project-context 时不得被动触发。"
